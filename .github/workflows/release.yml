name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  IS_CI: true

jobs:
  CheckTag:
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.check_tag.outputs.package_version }}
    steps:
      - name: Check package version
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Check if tag version exists and matches package.json version
        id: check_tag
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "Package version: $PACKAGE_VERSION"

          if git rev-parse "v$PACKAGE_VERSION" >/dev/null 2>&1; then
            echo "Tag already exists. Output empty tag."
            echo "tag=" >> $GITHUB_OUTPUT
          else
            echo "Tag does not exist. Output package version."
            echo "package_version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
          fi

  Release:
    needs: CheckTag
    name: Release
    runs-on: ubuntu-latest
    if: needs.CheckTag.outputs.package_version != ''
    steps:
      - name: Check out git repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: corepack enable && pnpm install --workspace-root --frozen-lockfile

      - name: Build src code
        run: npm run build

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          # body_path: ./publish/changeLog.md
          prerelease: false
          draft: false
          tag_name: v${{ needs.CheckTag.outputs.package_version }}
          files: |
            ./dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
